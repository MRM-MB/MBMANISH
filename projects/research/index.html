                    document.documentElement.classList.add('dark-mode');
                    document.documentElement.style.backgroundColor = '#0d1117';
                    document.documentElement.style.color = '#e6edf3';
                    document.documentElement.style.colorScheme = 'dark';
                }
            } catch (e) {
                /* no-op */
            }
        })();
